name: Build

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: Direct URL to a modded Spotify APK
        required: true
        type: string
      version:
        description: Spotify version (e.g. 9.1.60.1970)
        required: true
        type: string

env:
  MODULE_ID: ronspotipy
  MODULE_NAME: Ronspotipy
  MODULE_AUTHOR: ronspotipy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download modded APK
        run: |
          curl -sL -o modded.apk "${{ inputs.apk_url }}"
          echo "SPOTIFY_VERSION=${{ inputs.version }}" >> $GITHUB_ENV

      - name: Build module
        run: |
          bash scripts/build-module.sh

      - name: Create release
        run: |
          MODULE_ZIP=$(ls out/*.zip | head -1)
          TAG="v${{ inputs.version }}"
          gh release create "$TAG" \
            "$MODULE_ZIP" \
            --title "Ronspotipy v${{ inputs.version }}" \
            --notes "Modded Spotify v${{ inputs.version }}"
