name: Build

on:
  schedule:
    - cron: 0 6 * * 1
  workflow_dispatch:
    inputs:
      spotify_version:
        description: Spotify version to patch (e.g. 9.1.60.1970)
        required: false
        type: string

env:
  MODULE_ID: ronspotipy
  MODULE_NAME: Ronspotipy
  MODULE_AUTHOR: ronspotipy
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install requests

      - name: Get ReVanced CLI
        run: |
          curl -sL https://github.com/ReVanced/revanced-cli/releases/latest | python3 -c "
import sys, re, urllib.request
html = sys.stdin.read()
match = re.search(r'/ReVanced/revanced-cli/releases/download/v[\d.]+/revanced-cli-[\d.]+-all\.jar', html)
if match:
    url = 'https://github.com' + match.group()
    print(f'Downloading {url}')
    urllib.request.urlretrieve(url, 'revanced-cli.jar')
else:
    print('ERROR: could not find CLI jar URL', file=sys.stderr)
    sys.exit(1)
"

      - name: Get ReVanced Patches
        run: |
          curl -sL https://github.com/ReVanced/revanced-patches/releases/latest | python3 -c "
import sys, re, urllib.request
html = sys.stdin.read()
match = re.search(r'/ReVanced/revanced-patches/releases/download/v[\d.]+/patches-[\d.]+\.rvp', html)
if match:
    url = 'https://github.com' + match.group()
    print(f'Downloading {url}')
    urllib.request.urlretrieve(url, 'patches.rvp')
else:
    print('ERROR: could not find patches RVP URL', file=sys.stderr)
    sys.exit(1)
"

      - name: Get Spotify APK
        run: |
          python scripts/download-spotify.py "${{ inputs.spotify_version }}"

      - name: Check available patches
        run: |
          java -jar revanced-cli.jar list-patches -b patches.rvp 2>&1 | grep -i spotify || echo "NO_SPOTIFY_PATCHES"

      - name: Patch APK
        run: |
          SPOTIFY_APK=$(ls spotify-*.apk 2>/dev/null | head -1)
          java -jar revanced-cli.jar patch \
            -b patches.rvp \
            -e microg-support \
            -i premium \
            -o modded.apk \
            "$SPOTIFY_APK" 2>&1 | tail -20

      - name: Build module
        run: |
          bash scripts/build-module.sh

      - name: Create release
        run: |
          MODULE_ZIP=$(ls out/*.zip | head -1)
          VERSION=$(basename "$MODULE_ZIP" .zip | rev | cut -d- -f1 | rev)
          TAG="v$VERSION"

          gh release create "$TAG" \
            "$MODULE_ZIP" \
            --title "Ronspotipy v$VERSION" \
            --notes "Auto-built from Spotify $VERSION + latest ReVanced patches."
